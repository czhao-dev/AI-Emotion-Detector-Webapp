<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Emotion Detector</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script defer src="{{ url_for('static', filename='mywebscript.js') }}"></script>
</head>
<body>
    <main class="app-shell">
        <section class="workspace" aria-labelledby="app-title">
            <header class="app-header">
                <div>
                    <p class="eyebrow">Natural Language Processing</p>
                    <h1 id="app-title">AI Emotion Detector</h1>
                </div>
                <span class="status-pill" id="statusPill">Ready</span>
            </header>

            <div class="analysis-grid">
                <form class="input-panel" id="analysisForm">
                    <label for="textToAnalyze">Text to analyze</label>
                    <textarea
                        id="textToAnalyze"
                        name="textToAnalyze"
                        rows="9"
                        maxlength="1200"
                        placeholder="I am thrilled about the launch, but nervous about the deadline."
                    ></textarea>
                    <div class="form-footer">
                        <span id="characterCount">0 / 1200</span>
                        <button type="submit" id="analyzeButton">Analyze Emotion</button>
                    </div>
                </form>

                <section class="result-panel" aria-live="polite">
                    <div class="dominant-card">
                        <span>Dominant emotion</span>
                        <strong id="dominantEmotion">Waiting</strong>
                    </div>
                    <div class="score-list" id="scoreList"></div>
                    <p class="message" id="systemResponse">Enter text and run the analysis.</p>
                </section>
            </div>
        </section>
    </main>
</body>
</html>
